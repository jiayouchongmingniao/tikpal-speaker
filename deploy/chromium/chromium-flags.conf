# Tikpal Pi4 kiosk baseline
--enable-pinch
--kiosk
--start-fullscreen
--window-size=2560,720
--window-position=0,0
--no-first-run
--no-default-browser-check
--noerrdialogs
--disable-infobars
--disable-session-crashed-bubble
--overscroll-history-navigation=0
--autoplay-policy=no-user-gesture-required
--disable-features=UseOzonePlatform,MediaRouter,Translate,OptimizationHints,AutofillServerCommunication,CertificateTransparencyComponentUpdater,OverscrollHistoryNavigation
--ozone-platform=x11

# App-only browser noise reduction
--disable-background-networking
--disable-background-timer-throttling
--disable-component-update
--disable-default-apps
--disable-domain-reliability
--disable-popup-blocking
--disable-renderer-backgrounding
--disable-sync
--metrics-recording-only
--no-pings

# Pi4 experiment notes
# - Keep stable defaults in this file.
# - Use .env.kiosk TIKPAL_CHROMIUM_EXPERIMENT for repeatable preset groups:
#   baseline | pi4-gpu-balanced | pi4-gpu-conservative | pi4-low-memory
# - Treat unsupported or no-op Chromium flags as experiment artifacts until a
#   Pi trace proves they are worth keeping.
